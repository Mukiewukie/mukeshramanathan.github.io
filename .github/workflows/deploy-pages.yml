name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build and export static site
        run: npm run export

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Ensure GitHub Pages enabled
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              core.info('GitHub Pages already enabled for this repository.');
            } catch (err) {
              core.info('GitHub Pages not found; enabling Pages using the main branch.');
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                source: { branch: 'main', path: '/' }
              });
            }

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
